<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson | English Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fff9f0; --card: #ffffff; --primary: #ff6b35; --secondary: #4ecdc4;
            --accent: #ffe66d; --text: #1e1b18; --muted: #78716c; --shadow: 0 4px 0 #e5d5c5; --radius: 20px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Nunito', sans-serif; background: var(--bg); padding: 24px; min-height: 100vh; }
        
        .container { max-width: 800px; margin: 0 auto; }
        .back-btn { display: inline-block; margin-bottom: 20px; font-weight: 800; color: var(--primary); text-decoration: none; padding: 10px 20px; border-radius: 12px; border: 2px solid #e5d5c5; background: var(--card); }
        
        /* สไตล์เนื้อหาที่ AI จะส่งให้ */
        .content-card { background: var(--card); border-radius: var(--radius); padding: 30px; box-shadow: var(--shadow); border: 2px solid #f0e8df; margin-bottom: 20px; }
        h1 { font-family: 'Fredoka One', cursive; color: var(--primary); margin-bottom: 20px; text-align: center; }
        h2 { color: var(--secondary); margin: 25px 0 15px; font-family: 'Fredoka One', cursive; }
        
        .structure-box { background-color: #faf5f0; padding: 15px; border-radius: 12px; font-weight: 700; border-left: 4px solid var(--accent); margin-bottom: 15px; }
        .example-box { background-color: #f8fafc; padding: 15px; border-radius: 12px; border: 2px dashed #e2e8f0; }
        .highlight { background-color: #fff3e0; color: var(--primary); padding: 2px 6px; border-radius: 6px; font-weight: 800; }
        
        .ted-box { background: #f0fdfa; border: 2px dashed var(--secondary); padding: 20px; border-radius: var(--radius); margin-top: 30px; display: flex; align-items: center; gap: 15px; }
        .ted-emoji { font-size: 40px; }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="back-btn">← ย้อนกลับไปหน้าหลัก</a>

    <div id="content">
        <!-- AI จะสร้างเนื้อหามาวางในนี้ -->
    </div>
</div>

</body>
</html>
