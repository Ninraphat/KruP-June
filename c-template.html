<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">Loading...</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════
   DESIGN TOKENS — ไม่แตะ
═══════════════════════════════════════════════ */
:root {
  --bg: #fff9f0;
  --card: #ffffff;
  --primary: #ff6b35;
  --secondary: #4ecdc4;
  --accent: #ffe66d;
  --purple: #a855f7;
  --green: #22c55e;
  --red: #ef4444;
  --blue: #3b82f6;
  --amber: #f59e0b;
  --text: #1e1b18;
  --muted: #78716c;
  --shadow: 0 4px 0 #e5d5c5;
  --radius: 16px;
  /* Dynamic — set by JS from content file */
  --accent-color: var(--primary);
  --accent-shadow: #d94e1f;
}

/* ── COLOR MAP (used by JS) ── */
.c-primary  { color: var(--primary); }
.c-secondary{ color: var(--secondary); }
.c-purple   { color: var(--purple); }
.c-blue     { color: var(--blue); }
.c-green    { color: var(--green); }
.c-red      { color: var(--red); }
.c-amber    { color: var(--amber); }
.c-muted    { color: var(--muted); }

.bg-primary  { background: var(--primary); }
.bg-secondary{ background: var(--secondary); }
.bg-purple   { background: var(--purple); }
.bg-blue     { background: var(--blue); }
.bg-green    { background: var(--green); }
.bg-amber    { background: var(--amber); }

/* ═══════════════════════════════════════════════
   BASE
═══════════════════════════════════════════════ */
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  background-image:
    radial-gradient(circle at 10% 20%, #ffe66d33 0%, transparent 40%),
    radial-gradient(circle at 90% 80%, #4ecdc433 0%, transparent 40%);
  min-height: 100vh; color: var(--text); padding: 24px 16px 80px;
}

/* ═══════════════════════════════════════════════
   BACK BUTTON
═══════════════════════════════════════════════ */
.back-btn {
  display: inline-flex; align-items: center; gap: 8px;
  background: white; border: 2px solid #f0e8df; box-shadow: 0 3px 0 #e5d5c5;
  border-radius: 999px; padding: 8px 18px; font-size: 14px; font-weight: 800;
  color: var(--muted); text-decoration: none; margin-bottom: 24px; transition: all 0.2s;
}
.back-btn:hover { transform: translateY(-2px); color: var(--accent-color); }

/* ═══════════════════════════════════════════════
   HEADER
═══════════════════════════════════════════════ */
header { text-align: center; margin-bottom: 28px; }
.badge {
  display: inline-block; color: white;
  font-size: 12px; font-weight: 800; padding: 4px 14px;
  border-radius: 999px; margin-bottom: 10px; letter-spacing: 1px; text-transform: uppercase;
  background: var(--accent-color);
}
h1 { font-family: 'Fredoka One', cursive; font-size: clamp(26px,6vw,38px); color: var(--primary); line-height: 1.2; }
h1 .h1-accent { color: var(--accent-color); }
.subtitle { margin-top: 6px; color: var(--muted); font-size: 15px; font-weight: 600; }

/* ═══════════════════════════════════════════════
   STEP NAV
═══════════════════════════════════════════════ */
.step-nav { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-bottom: 28px; }
.step-btn {
  background: white; border: 2px solid #f0e8df; border-radius: 999px;
  padding: 7px 16px; font-size: 13px; font-weight: 800; color: var(--muted);
  cursor: pointer; transition: all 0.2s; white-space: nowrap; border: 2px solid #f0e8df;
}
.step-btn:hover  { border-color: var(--accent-color); color: var(--accent-color); }
.step-btn.active { color: white; border-color: var(--accent-color); background: var(--accent-color); }
.step-btn.done   { background: #d1fae5; border-color: var(--green); color: #065f46; }

/* ═══════════════════════════════════════════════
   SECTION WRAPPER
═══════════════════════════════════════════════ */
.section { display: none; max-width: 840px; margin: 0 auto; }
.section.active { display: block; animation: fadeUp 0.35s ease; }
@keyframes fadeUp { from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)} }

/* ═══════════════════════════════════════════════
   CARD
═══════════════════════════════════════════════ */
.card {
  background: var(--card); border-radius: var(--radius);
  box-shadow: var(--shadow); border: 2px solid #f0e8df; padding: 24px; margin-bottom: 20px;
}
.card-title {
  font-family: 'Fredoka One', cursive; font-size: 20px;
  margin-bottom: 14px; display: flex; align-items: center; gap: 10px;
  color: var(--accent-color);
}
.card-intro { font-size: 14px; font-weight: 700; color: var(--muted); margin-bottom: 16px; line-height: 1.6; }

/* ═══════════════════════════════════════════════
   BLOCK TYPES
═══════════════════════════════════════════════ */

/* ── TABLE ── */
.b-table { width: 100%; border-collapse: collapse; font-size: 14px; margin-bottom: 4px; }
.b-table th {
  padding: 10px 14px; text-align: left; color: white;
  font-family: 'Fredoka One', cursive; font-size: 14px;
}
.b-table th:first-child { border-radius: 10px 0 0 0; }
.b-table th:last-child  { border-radius: 0 10px 0 0; }
.b-table td { padding: 11px 14px; border-bottom: 2px solid #f0e8df; font-weight: 600; vertical-align: top; }
.b-table tr:last-child td { border-bottom: none; }
.b-table tr:nth-child(even) td { background: #faf5f0; }

/* ── EXAMPLES ── */
.b-examples { display: flex; flex-direction: column; gap: 10px; }
.ex-row {
  background: #faf5f0; border-radius: 10px; border-left: 4px solid var(--secondary);
  padding: 12px 16px;
}
.ex-row .en { font-size: 16px; font-weight: 800; color: var(--text); line-height: 1.5; }
.ex-row .th { font-size: 13px; color: var(--muted); font-weight: 700; margin-top: 3px; }

/* ── COMPARE GRID ── */
.b-compare { display: grid; gap: 12px; }
.b-compare.cols-2 { grid-template-columns: 1fr 1fr; }
.b-compare.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
.cmp-box { border-radius: 14px; padding: 16px; border: 2px solid transparent; text-align: center; }
.cmp-word { font-family: 'Fredoka One', cursive; font-size: 28px; line-height: 1; margin-bottom: 6px; }
.cmp-sub  { font-size: 12px; font-weight: 800; color: var(--muted); margin-bottom: 8px; }
.cmp-body { font-size: 14px; font-weight: 700; color: var(--text); line-height: 1.6; }

/* ── ALERT BOX ── */
.b-alert {
  border-radius: 12px; padding: 14px 18px; margin-top: 0;
  display: flex; gap: 12px; align-items: flex-start;
}
.b-alert .alert-icon { font-size: 22px; flex-shrink: 0; margin-top: 1px; }
.b-alert .alert-body { font-size: 14px; font-weight: 700; color: var(--text); line-height: 1.6; }
.b-alert .alert-body strong { display: block; margin-bottom: 4px; }
.alert-yellow { background: #fffbeb; border: 2px solid #fde68a; }
.alert-purple { background: #faf5ff; border: 2px solid #e9d5ff; }
.alert-red    { background: #fff1f2; border: 2px solid #fecdd3; }
.alert-blue   { background: #eff6ff; border: 2px solid #bfdbfe; }
.alert-green  { background: #f0fdf4; border: 2px solid #86efac; }
.alert-teal   { background: #f0fdfa; border: 2px solid #99f6e4; }

/* ── PILL GRID ── */
.b-pills { display: flex; flex-wrap: wrap; gap: 8px; margin: 8px 0; }
.pill {
  padding: 7px 16px; border-radius: 999px; font-size: 14px; font-weight: 800;
  border: 2px solid transparent;
}

/* ── SVA ROWS ── */
.sva-row {
  display: flex; align-items: flex-start; gap: 10px;
  background: #faf5ff; border: 2px solid #e9d5ff; border-radius: 10px;
  padding: 12px 14px; margin-bottom: 8px;
}
.sva-word  { font-family: 'Fredoka One', cursive; font-size: 16px; color: var(--purple); min-width: 90px; flex-shrink: 0; }
.sva-arrow { font-size: 18px; color: var(--muted); flex-shrink: 0; margin-top: 2px; }
.sva-rule  { font-size: 14px; font-weight: 800; color: var(--text); }
.sva-ex    { font-size: 13px; color: var(--muted); font-weight: 700; margin-top: 3px; }

/* ── HIGHLIGHT SPANS (used in text) ── */
.hl { font-weight: 900; }
.hl-primary  { color: var(--primary);   font-weight: 900; }
.hl-secondary{ color: var(--secondary); font-weight: 900; }
.hl-purple   { color: var(--purple);    font-weight: 900; }
.hl-blue     { color: var(--blue);      font-weight: 900; }
.hl-green    { color: var(--green);     font-weight: 900; }
.hl-red      { color: var(--red);       font-weight: 900; }
.hl-amber    { color: var(--amber);     font-weight: 900; }

/* ── QUICK REF TABLE (compact) ── */
.qr-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.qr-table th { padding: 8px 12px; text-align: left; color: white; font-family: 'Fredoka One', cursive; font-size: 13px; }
.qr-table th:first-child { border-radius: 8px 0 0 0; }
.qr-table th:last-child  { border-radius: 0 8px 0 0; }
.qr-table td { padding: 9px 12px; border-bottom: 1.5px solid #f0e8df; font-weight: 600; font-size: 13px; }
.qr-table tr:last-child td { border-bottom: none; }
.qr-table tr:nth-child(even) td { background: #faf5f0; }
.verb-sg   { background: #f0fdf4; color: #15803d; font-weight: 800; padding: 2px 8px; border-radius: 6px; font-size: 11px; }
.verb-pl   { background: #eff6ff; color: var(--blue); font-weight: 800; padding: 2px 8px; border-radius: 6px; font-size: 11px; }
.verb-both { background: #fffbeb; color: #92400e; font-weight: 800; padding: 2px 8px; border-radius: 6px; font-size: 11px; }

/* ═══════════════════════════════════════════════
   QUIZ (MINI QUIZ IN CONTENT)
═══════════════════════════════════════════════ */
.quiz-header { text-align: center; margin-bottom: 20px; }
.quiz-header h2 { font-family: 'Fredoka One', cursive; font-size: 22px; color: var(--primary); }
.quiz-header p  { font-size: 14px; font-weight: 700; color: var(--muted); margin-top: 4px; }

.q-card {
  background: white; border: 2px solid #f0e8df; border-radius: var(--radius);
  padding: 20px; margin-bottom: 14px; box-shadow: 0 2px 0 #e5d5c5;
}
.q-num     { font-size: 11px; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
.q-emoji   { font-size: 30px; display: block; margin-bottom: 8px; }
.q-tag     { display: inline-block; font-size: 11px; font-weight: 800; padding: 2px 8px; border-radius: 999px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.q-sentence{ font-size: 18px; font-weight: 800; color: var(--text); margin-bottom: 14px; line-height: 1.6; }
.q-blank   { display: inline-block; min-width: 80px; border-bottom: 3px solid var(--accent-color); text-align: center; color: var(--accent-color); font-weight: 900; padding: 0 6px; margin: 0 4px; }
.q-blank.correct-blank { color: var(--green); border-bottom-color: var(--green); }
.q-blank.wrong-blank   { color: var(--red);   border-bottom-color: var(--red); }

.choices { display: flex; gap: 8px; flex-wrap: wrap; }
.choice-btn {
  background: white; border: 2px solid #e5d5c5; border-radius: 10px;
  padding: 9px 20px; font-family: 'Nunito', sans-serif; font-size: 15px;
  font-weight: 800; cursor: pointer; color: var(--text); transition: all 0.15s;
}
.choice-btn:hover:not(:disabled) { border-color: var(--accent-color); background: #faf5f0; transform: translateY(-2px); }
.choice-btn.correct { background: #d1fae5 !important; border-color: var(--green) !important; color: #065f46 !important; }
.choice-btn.wrong   { background: #fee2e2 !important; border-color: var(--red)   !important; color: #991b1b !important; }
.choice-btn:disabled { cursor: default; transform: none; }

.feedback { margin-top: 12px; padding: 10px 14px; border-radius: 10px; font-size: 14px; font-weight: 700; display: none; line-height: 1.5; }
.feedback.show { display: block; }
.feedback.ok { background: #d1fae5; color: #065f46; }
.feedback.ng { background: #fee2e2; color: #991b1b; }

/* ── SCORE BOX ── */
.score-box { text-align: center; background: white; border: 2px solid #f0e8df; border-radius: var(--radius); padding: 32px; box-shadow: var(--shadow); display: none; }
.score-box.show { display: block; animation: fadeUp 0.4s ease; }
.score-big  { font-family: 'Fredoka One', cursive; font-size: 60px; color: var(--primary); line-height: 1; }
.score-sub  { font-size: 15px; font-weight: 800; color: var(--muted); margin-top: 4px; }
.score-msg  { font-size: 18px; font-weight: 800; color: var(--text); margin: 16px 0 20px; }
.score-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; }
.sg { background: #faf5f0; border: 2px solid #f0e8df; border-radius: 12px; padding: 12px; text-align: center; }
.sg-icon { font-size: 22px; }
.sg-lbl  { font-size: 11px; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin: 4px 0 2px; }
.sg-val  { font-family: 'Fredoka One', cursive; font-size: 22px; color: var(--primary); }

/* ═══════════════════════════════════════════════
   NAV BUTTONS
═══════════════════════════════════════════════ */
.nav-btns { display: flex; justify-content: space-between; align-items: center; margin-top: 24px; max-width: 840px; margin-left: auto; margin-right: auto; }
.btn {
  color: white; border: none; border-radius: 12px;
  padding: 12px 28px; font-family: 'Nunito', sans-serif; font-size: 15px;
  font-weight: 800; cursor: pointer; transition: all 0.15s;
  background: var(--accent-color); box-shadow: 0 4px 0 var(--accent-shadow);
}
.btn:hover  { transform: translateY(-2px); box-shadow: 0 6px 0 var(--accent-shadow); }
.btn:active { transform: translateY(1px);  box-shadow: 0 2px 0 var(--accent-shadow); }
.btn.sec { background: white; color: var(--muted); box-shadow: 0 4px 0 #e5d5c5; border: 2px solid #f0e8df; }
.btn.sec:hover { color: var(--text); box-shadow: 0 6px 0 #e5d5c5; }
.btn.grn { background: var(--green); box-shadow: 0 4px 0 #15803d; }
.btn.grn:hover { box-shadow: 0 6px 0 #15803d; }

@media(max-width:580px){
  .b-compare.cols-2, .b-compare.cols-3 { grid-template-columns: 1fr; }
  .score-grid { grid-template-columns: 1fr 1fr; }
  .nav-btns { flex-direction: column; gap: 10px; }
  .nav-btns .btn { width: 100%; text-align: center; }
}
</style>
</head>
<body>

<a class="back-btn" href="index.html">← กลับหน้าหลัก</a>
<header>
  <div class="badge" id="hdr-badge"></div>
  <h1 id="hdr-title"></h1>
  <p class="subtitle" id="hdr-subtitle"></p>
</header>
<div class="step-nav" id="step-nav"></div>
<div id="sections-root"></div>

<!-- ═══════════════════════════════════════════
     TEMPLATE ENGINE
     Load content file BEFORE this script tag
═══════════════════════════════════════════ -->
<script>
/* ───────────────────────────────────────────
   COLOR HELPERS
─────────────────────────────────────────── */
const COLOR = {
  primary:   { hex:'#ff6b35', shadow:'#d94e1f', light:'#fff3e0', border:'#fed7aa' },
  secondary: { hex:'#4ecdc4', shadow:'#2db5ac', light:'#f0fdfa', border:'#99f6e4' },
  purple:    { hex:'#a855f7', shadow:'#7c3aed', light:'#faf5ff', border:'#e9d5ff' },
  blue:      { hex:'#3b82f6', shadow:'#1d4ed8', light:'#eff6ff', border:'#bfdbfe' },
  green:     { hex:'#22c55e', shadow:'#15803d', light:'#f0fdf4', border:'#86efac' },
  amber:     { hex:'#f59e0b', shadow:'#b45309', light:'#fffbeb', border:'#fde68a' },
  red:       { hex:'#ef4444', shadow:'#b91c1c', light:'#fff1f2', border:'#fecdd3' },
  teal:      { hex:'#4ecdc4', shadow:'#2db5ac', light:'#f0fdfa', border:'#99f6e4' },
};
function col(name){ return COLOR[name] || COLOR.primary; }

/* ───────────────────────────────────────────
   MARKDOWN-LITE PARSER
   Supports: **bold**, *italic*, `code`,
   [hl:color]text[/hl]
─────────────────────────────────────────── */
function md(str){
  if(!str) return '';
  return str
    .replace(/\[hl:([\w]+)\](.*?)\[\/hl\]/g, (_,c,t)=>`<span class="hl" style="color:${col(c).hex}">${t}</span>`)
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/`(.*?)`/g, '<code style="background:#f0e8df;padding:1px 6px;border-radius:4px;font-size:13px">$1</code>');
}

/* ───────────────────────────────────────────
   BLOCK RENDERERS
─────────────────────────────────────────── */
function renderBlock(b){
  switch(b.type){
    case 'explanation': return renderExplanation(b);
    case 'table':       return renderTable(b);
    case 'examples':    return renderExamples(b);
    case 'compare':     return renderCompare(b);
    case 'alert':       return renderAlert(b);
    case 'pills':       return renderPills(b);
    case 'sva':         return renderSVA(b);
    case 'quickref':    return renderQuickRef(b);
    case 'html':        return b.content; // raw HTML escape hatch
    default: return '';
  }
}

function renderExplanation(b){
  return `<p class="card-intro">${md(b.text)}</p>`;
}

function renderTable(b){
  const accentCol = CONTENT.accentColor || 'primary';
  const thStyle = `background:${col(b.headerColor || accentCol).hex}`;
  const thead = b.headers.map(h=>`<th style="${thStyle}">${h}</th>`).join('');
  const tbody = b.rows.map(r=>`<tr>${r.map((c,ci)=>{
    const txt = typeof c === 'object'
      ? `<div style="font-weight:800">${md(c.main)}</div>${c.note?`<div class="note-sm" style="font-size:12px;color:var(--muted);margin-top:3px">${md(c.note)}</div>`:''}`
      : md(c);
    return `<td>${txt}</td>`;
  }).join('')}</tr>`).join('');
  return `<table class="b-table" style="margin-bottom:12px"><thead><tr>${thead}</tr></thead><tbody>${tbody}</tbody></table>`;
}

function renderExamples(b){
  const borderColor = b.borderColor ? col(b.borderColor).hex : col(CONTENT.accentColor||'secondary').hex;
  const items = b.items.map(ex=>`
    <div class="ex-row" style="border-left-color:${borderColor}">
      <div class="en">${md(ex.en)}</div>
      ${ex.th ? `<div class="th">${ex.th}</div>` : ''}
    </div>`).join('');
  return `<div class="b-examples">${items}</div>`;
}

function renderCompare(b){
  const cols = b.cols || b.items.length;
  const colClass = cols === 3 ? 'cols-3' : 'cols-2';
  const boxes = b.items.map(item=>{
    const c = col(item.color || 'primary');
    return `<div class="cmp-box" style="background:${c.light};border-color:${c.hex}">
      ${item.word ? `<div class="cmp-word" style="color:${c.hex}">${item.word}</div>` : ''}
      ${item.sub  ? `<div class="cmp-sub">${item.sub}</div>` : ''}
      <div class="cmp-body">${md(item.body)}</div>
    </div>`;
  }).join('');
  return `<div class="b-compare ${colClass}" style="margin-bottom:4px">${boxes}</div>`;
}

function renderAlert(b){
  const cls = `alert-${b.color || 'yellow'}`;
  return `<div class="b-alert ${cls}" style="margin-bottom:4px">
    <div class="alert-icon">${b.icon || '💡'}</div>
    <div class="alert-body">${b.title?`<strong>${b.title}</strong>`:''}${md(b.text)}</div>
  </div>`;
}

function renderPills(b){
  const pills = b.items.map(p=>{
    const c = col(p.color || 'primary');
    return `<span class="pill" style="background:${c.light};border-color:${c.border};color:${c.hex}">${md(p.text)}</span>`;
  }).join('');
  return `<div class="b-pills">${pills}</div>`;
}

function renderSVA(b){
  return b.rows.map(r=>`
    <div class="sva-row">
      <div class="sva-word">${r.quantifier}</div>
      <div class="sva-arrow">→</div>
      <div>
        <div class="sva-rule">${md(r.rule)}</div>
        <div class="sva-ex">${md(r.example)}</div>
      </div>
    </div>`).join('');
}

function renderQuickRef(b){
  const thStyle = `background:${col(b.headerColor || CONTENT.accentColor || 'primary').hex}`;
  const thead = b.headers.map(h=>`<th style="${thStyle}">${h}</th>`).join('');
  const tbody = b.rows.map(r=>`<tr>${r.map((c,ci)=>{
    if(typeof c === 'object' && c.badge){
      const badgeClass = c.badge === 'sg' ? 'verb-sg' : c.badge === 'pl' ? 'verb-pl' : 'verb-both';
      return `<td><span class="${badgeClass}">${c.text}</span></td>`;
    }
    return `<td>${md(c)}</td>`;
  }).join('')}</tr>`).join('');
  return `<table class="qr-table"><thead><tr>${thead}</tr></thead><tbody>${tbody}</tbody></table>`;
}

/* ───────────────────────────────────────────
   SECTION RENDERER
─────────────────────────────────────────── */
function renderSection(sec, accentColor){
  const div = document.createElement('div');
  div.className = 'section' + (sec.id === 1 ? ' active' : '');
  div.id = `sec-${sec.id}`;

  // cards
  const cardsHTML = sec.cards.map(card=>{
    const titleColor = col(card.titleColor || accentColor).hex;
    const blocksHTML = card.blocks.map(renderBlock).join('');
    return `<div class="card">
      ${card.title ? `<div class="card-title" style="color:${titleColor}">${card.icon||''} ${card.title}</div>` : ''}
      ${blocksHTML}
    </div>`;
  }).join('');

  // nav buttons
  const total = CONTENT.sections.length;
  const isLast = sec.id === total;
  const nextSec = CONTENT.sections.find(s=>s.id===sec.id+1);
  const nextLabel = nextSec ? `ถัดไป: ${nextSec.label.replace(/^\S+\s*/,'')} →` : 'ทำแบบฝึกหัด ✏️';

  const prevBtn = sec.id > 1
    ? `<button class="btn sec" onclick="goSection(${sec.id-1})">← ย้อนกลับ</button>`
    : '<div></div>';
  const nextBtn = `<button class="btn" onclick="goSection(${sec.id+1})">${nextLabel}</button>`;

  div.innerHTML = cardsHTML + `<div class="nav-btns">${prevBtn}${nextBtn}</div>`;
  return div;
}

/* ───────────────────────────────────────────
   QUIZ RENDERER
─────────────────────────────────────────── */
let quizAnswered = 0, quizCorrect = 0;

function renderQuiz(){
  const quizSec = document.createElement('div');
  quizSec.className = 'section';
  quizSec.id = `sec-${CONTENT.sections.length + 1}`;

  const qs = CONTENT.quiz;
  const questionsHTML = qs.map((q,i)=>{
    const sent = (q.sentence||'').replace('___', `<span class="q-blank" id="ql-bl-${i}">___</span>`);
    const tagHTML = q.tag ? `<span class="q-tag" style="background:${col(q.tagColor||'secondary').light};color:${col(q.tagColor||'secondary').hex};border:1.5px solid ${col(q.tagColor||'secondary').border}">${q.tag}</span>` : '';
    const emojiHTML = q.emoji ? `<span class="q-emoji">${q.emoji}</span>` : '';
    const opts = (q.options||[]).map(o=>
      `<button class="choice-btn" id="qlc-${i}-${o.replace(/[^a-zA-Z0-9]/g,'_')}" onclick="chkQuiz(${i},'${o.replace(/'/g,"\\'")}'">${o}</button>`
    ).join('');
    return `<div class="q-card" id="qlcard-${i}">
      <div class="q-num">ข้อ ${i+1} / ${qs.length}</div>
      ${tagHTML}${emojiHTML}
      <div class="q-sentence">${sent}</div>
      <div class="choices">${opts}</div>
      <div class="feedback" id="qlfb-${i}"></div>
    </div>`;
  }).join('');

  quizSec.innerHTML = `
    <div class="quiz-header">
      <h2>✏️ Mini Quiz — ${qs.length} ข้อ</h2>
      <p>${CONTENT.quizIntro || 'เลือกคำตอบที่ถูกต้อง'}</p>
    </div>
    ${questionsHTML}
    <div class="score-box" id="ql-score"></div>
    <div class="nav-btns" style="margin-top:16px">
      <button class="btn sec" onclick="goSection(${CONTENT.sections.length})">← ย้อนกลับ</button>
      <button class="btn grn" id="ql-retry" onclick="resetQuiz()" style="display:none">🔁 ทำใหม่</button>
    </div>`;
  return quizSec;
}

function chkQuiz(i, sel){
  const q = CONTENT.quiz[i];
  const ok = sel === q.answer;
  if(ok) quizCorrect++; quizAnswered++;
  (q.options||[]).forEach(o=>{
    const b = document.getElementById(`qlc-${i}-${o.replace(/[^a-zA-Z0-9]/g,'_')}`);
    if(!b) return; b.disabled = true;
    if(o===q.answer) b.classList.add('correct');
    else if(o===sel) b.classList.add('wrong');
  });
  const bl = document.getElementById(`ql-bl-${i}`);
  if(bl){ bl.textContent = q.answer; bl.classList.add(ok?'correct-blank':'wrong-blank'); }
  const fb = document.getElementById(`qlfb-${i}`);
  fb.classList.add('show', ok?'ok':'ng');
  fb.innerHTML = (ok?'✅ ถูกต้อง! ':`❌ ผิด — คำตอบที่ถูกคือ <strong>${q.answer}</strong><br>`) + (q.explanation||'');
  if(quizAnswered === CONTENT.quiz.length) showQuizScore();
}

function showQuizScore(){
  const pct = Math.round(quizCorrect/CONTENT.quiz.length*100);
  const msg = pct===100?'🏆 Perfect!':pct>=80?'🎉 ดีมาก!':pct>=60?'👍 ผ่านแล้ว':'📚 ลองทบทวนใหม่นะ';
  const box = document.getElementById('ql-score');
  box.innerHTML = `
    <div class="score-big">${quizCorrect}/${CONTENT.quiz.length}</div>
    <div class="score-sub">คะแนน</div>
    <div class="score-msg">${msg}</div>
    <div class="score-grid">
      <div class="sg"><div class="sg-icon">✅</div><div class="sg-lbl">ถูก</div><div class="sg-val" style="color:var(--green)">${quizCorrect}</div></div>
      <div class="sg"><div class="sg-icon">❌</div><div class="sg-lbl">ผิด</div><div class="sg-val" style="color:var(--red)">${CONTENT.quiz.length-quizCorrect}</div></div>
      <div class="sg"><div class="sg-icon">📊</div><div class="sg-lbl">คะแนน</div><div class="sg-val">${pct}%</div></div>
    </div>`;
  box.classList.add('show');
  document.getElementById('ql-retry').style.display='inline-block';
  box.scrollIntoView({behavior:'smooth',block:'center'});
}

function resetQuiz(){
  quizAnswered = 0; quizCorrect = 0;
  const sec = document.getElementById(`sec-${CONTENT.sections.length+1}`);
  sec.querySelectorAll('.choice-btn').forEach(b=>{b.disabled=false;b.classList.remove('correct','wrong');});
  sec.querySelectorAll('.q-blank').forEach(bl=>{bl.textContent='___';bl.classList.remove('correct-blank','wrong-blank');});
  sec.querySelectorAll('.feedback').forEach(f=>{f.classList.remove('show','ok','ng');f.innerHTML='';});
  document.getElementById('ql-score').classList.remove('show');
  document.getElementById('ql-retry').style.display='none';
}

/* ───────────────────────────────────────────
   NAVIGATION
─────────────────────────────────────────── */
let currentSection = 1;
const totalSections = () => CONTENT.sections.length + 1; // +1 for quiz

function goSection(n){
  document.getElementById(`sec-${currentSection}`).classList.remove('active');
  const prevStep = document.getElementById(`step-${currentSection}`);
  if(prevStep){ prevStep.classList.remove('active'); if(currentSection < totalSections()) prevStep.classList.add('done'); }
  currentSection = n;
  document.getElementById(`sec-${n}`).classList.add('active');
  const curStep = document.getElementById(`step-${n}`);
  if(curStep){ curStep.classList.add('active'); curStep.classList.remove('done'); }
  window.scrollTo({top:0,behavior:'smooth'});
}

/* ───────────────────────────────────────────
   INIT — runs after CONTENT is loaded
─────────────────────────────────────────── */
function init(){
  const accent = CONTENT.accentColor || 'primary';
  const c = col(accent);

  // CSS vars
  document.documentElement.style.setProperty('--accent-color', c.hex);
  document.documentElement.style.setProperty('--accent-shadow', c.shadow);

  // page title
  document.getElementById('page-title').textContent = `${CONTENT.title} | ${CONTENT.badge}`;

  // header
  document.getElementById('hdr-badge').textContent = CONTENT.badge;
  document.getElementById('hdr-badge').style.background = c.hex;
  document.getElementById('hdr-title').innerHTML = `${CONTENT.titleMain} <span class="h1-accent">${CONTENT.titleAccent}</span> ${CONTENT.emoji||''}`;
  document.getElementById('hdr-subtitle').textContent = CONTENT.subtitle;

  // step nav
  const nav = document.getElementById('step-nav');
  CONTENT.sections.forEach(sec=>{
    const btn = document.createElement('div');
    btn.className = 'step-btn' + (sec.id===1?' active':'');
    btn.id = `step-${sec.id}`;
    btn.textContent = sec.label;
    btn.onclick = ()=>goSection(sec.id);
    nav.appendChild(btn);
  });
  // quiz step
  const quizStep = document.createElement('div');
  quizStep.className = 'step-btn';
  quizStep.id = `step-${CONTENT.sections.length+1}`;
  quizStep.textContent = CONTENT.quizLabel || '✏️ Mini Quiz';
  quizStep.onclick = ()=>goSection(CONTENT.sections.length+1);
  nav.appendChild(quizStep);

  // render sections
  const root = document.getElementById('sections-root');
  CONTENT.sections.forEach(sec=>root.appendChild(renderSection(sec, accent)));
  root.appendChild(renderQuiz());
}

/* ───────────────────────────────────────────
   WAIT FOR CONTENT THEN INIT
─────────────────────────────────────────── */
if(typeof CONTENT !== 'undefined'){
  init();
} else {
  document.addEventListener('DOMContentLoaded', ()=>{
    if(typeof CONTENT !== 'undefined') init();
    else console.error('CONTENT not loaded — make sure to include the content .js file before this template');
  });
}
</script>
