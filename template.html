<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lesson | English Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  /* ดึงค่าสีและสไตล์มาจากหน้า Index ของคุณ */
  :root {
    --bg: #fff9f0; --card: #ffffff; --primary: #ff6b35; --secondary: #4ecdc4; 
    --accent: #ffe66d; --text: #1e1b18; --shadow: 0 4px 0 #e5d5c5; --radius: 16px;
  }
  body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); padding: 24px 16px; max-width: 800px; margin: 0 auto; }
  
  .back-btn { display: inline-block; margin-bottom: 20px; font-weight: 800; color: var(--primary); text-decoration: none; }
  
  /* สไตล์ของเนื้อหาบทเรียน */
  .content-card { background: var(--card); border-radius: var(--radius); padding: 30px; box-shadow: var(--shadow); border: 2px solid #f0e8df; margin-bottom: 20px; }
  h1 { font-family: 'Fredoka One', cursive; color: var(--primary); margin-bottom: 20px; }
  h2 { color: var(--secondary); margin: 20px 0 10px; }
  
  .ted-box { background: #fffdf0; border: 2px dashed var(--accent); padding: 20px; border-radius: var(--radius); margin-top: 30px; }
  .ted-box h3 { font-family: 'Fredoka One', cursive; color: #d97706; margin-bottom: 10px; }
  
  strong { color: var(--primary); }
</style>
</head>
<body>

<a href="index.html" class="back-btn">← ย้อนกลับไปหน้าหลัก</a>

<div id="content">
  <!-- 
       เวลาคุณสร้างเนื้อหาใหม่ ให้ก๊อปปี้เนื้อหาที่ AI เขียนให้ 
       มาวางในช่องว่างระหว่าง div ตรงนี้ครับ
  -->
  <div class="content-card">
    <h1>ชื่อหัวข้อบทเรียน</h1>
    <h2>Structure (โครงสร้าง)</h2>
    <p>...รายละเอียดเนื้อหา...</p>
    
    <h2>Usage (วิธีใช้)</h2>
    <p>...รายละเอียดเนื้อหา...</p>
  </div>

  <div class="ted-box">
    <h3>Ted Says 🦖</h3>
    <p>...ทริคจำง่ายๆ...</p>
  </div>
</div>

</body>
</html>
