<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Learning Hub 🌟</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fff9f0;
    --card: #ffffff;
    --primary: #ff6b35;
    --secondary: #4ecdc4;
    --accent: #ffe66d;
    --purple: #a855f7;
    --green: #22c55e;
    --red: #ef4444;
    --text: #1e1b18;
    --muted: #78716c;
    --shadow: 0 4px 0 #e5d5c5;
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    background-image:
      radial-gradient(circle at 10% 20%, #ffe66d33 0%, transparent 40%),
      radial-gradient(circle at 90% 80%, #4ecdc433 0%, transparent 40%),
      radial-gradient(circle at 50% 50%, #ff6b3511 0%, transparent 60%);
    min-height: 100vh;
    color: var(--text);
    padding: 24px 16px 60px;
  }

  header {
    text-align: center;
    margin-bottom: 24px;
  }

  .badge {
    display: inline-block;
    background: var(--primary);
    color: white;
    font-size: 13px;
    font-weight: 800;
    padding: 4px 14px;
    border-radius: 999px;
    margin-bottom: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  h1 {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(28px, 6vw, 48px);
    color: var(--primary);
    line-height: 1.1;
  }

  h1 span { color: var(--secondary); }

  .subtitle {
    margin-top: 6px;
    color: var(--muted);
    font-size: 15px;
    font-weight: 600;
  }

  /* Entrance Exam Button Container */
  .entrance-container {
    text-align: center;
    margin-bottom: 32px;
  }

  .btn-entrance {
    background: linear-gradient(135deg, #ff6b35, #ffbe0b);
    color: white;
    border: none;
    padding: 14px 36px;
    border-radius: var(--radius);
    font-family: 'Fredoka One', cursive;
    font-size: clamp(16px, 4vw, 22px);
    cursor: pointer;
    box-shadow: 0 6px 0 #d94e1f;
    transition: transform 0.1s, box-shadow 0.1s;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.15);
    display: inline-flex;
    align-items: center;
    gap: 10px;
  }

  .btn-entrance:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 0 #d94e1f;
  }

  .btn-entrance:active {
    transform: translateY(2px);
    box-shadow: 0 2px 0 #d94e1f;
  }

  /* Tabs */
  .tabs {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin-bottom: 32px;
    border-top: 2px dashed #e5d5c5;
    padding-top: 24px;
  }

  .tab-btn {
    background: white;
    border: 2px solid #f0e8df;
    box-shadow: var(--shadow);
    padding: 12px 28px;
    border-radius: 999px;
    font-family: 'Fredoka One', cursive;
    font-size: 18px;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
  }

  .tab-btn:hover {
    transform: translateY(-2px);
  }

  .tab-btn.active {
    background: var(--secondary);
    color: white;
    border-color: var(--secondary);
    box-shadow: 0 4px 0 #2db5ac;
  }

  /* Content Area */
  .content-section {
    display: none;
    max-width: 1200px;
    margin: 0 auto;
  }

  .content-section.active {
    display: block;
    animation: fadeIn 0.4s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Grid Layout for Topics */
  .topics-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 20px;
  }

  /* Topic Card (Accordion Style) */
  .topic-card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    border: 2px solid #f0e8df;
    transition: transform 0.2s, border-color 0.2s;
    overflow: hidden;
  }

  .topic-card:hover {
    transform: translateY(-2px);
    border-color: var(--accent);
  }

  .topic-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px;
    cursor: pointer;
    background: transparent;
    transition: background 0.2s;
  }

  .topic-header:hover {
    background: #faf5f0;
  }

  .topic-header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .topic-num {
    background: var(--primary);
    color: white;
    font-family: 'Fredoka One', cursive;
    width: 38px;
    height: 38px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .topic-title {
    font-size: 18px;
    font-weight: 800;
    color: var(--text);
    line-height: 1.2;
  }

  .toggle-icon {
    font-size: 14px;
    color: var(--muted);
    transition: transform 0.3s ease;
  }

  /* Card Open State */
  .topic-card.open .toggle-icon {
    transform: rotate(180deg);
    color: var(--primary);
  }

  .topic-card.open .topic-header {
    background: #faf5f0;
    border-bottom: 2px solid #f0e8df;
  }

  /* Level Buttons (Hidden by default) */
  .level-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 0 20px;
    max-height: 0;
    opacity: 0;
    transition: all 0.3s ease;
  }

  .topic-card.open .level-group {
    padding: 20px;
    max-height: 400px; /* มากพอที่จะแสดงเนื้อหา */
    opacity: 1;
  }

  .level-btn {
    background: #ffffff;
    border: 2px solid #e5d5c5;
    border-radius: 10px;
    padding: 12px 14px;
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: var(--text);
  }

  .level-btn:hover {
    background: #fff3e0;
    border-color: var(--primary);
    transform: translateY(-1px);
    box-shadow: 0 2px 0 #e5d5c5;
  }

  .level-tag {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 999px;
    background: #e5d5c5;
    color: var(--muted);
    font-weight: 800;
    text-transform: uppercase;
  }
  
  .level-btn.primary:hover .level-tag { background: var(--green); color: white; }
  .level-btn.junior:hover .level-tag { background: var(--secondary); color: white; }
  .level-btn.high:hover .level-tag { background: var(--purple); color: white; }

  /* Reading Section Placeholder */
  .reading-banner {
    background: linear-gradient(135deg, var(--purple), #c084fc);
    color: white;
    border-radius: var(--radius);
    padding: 40px 20px;
    text-align: center;
    box-shadow: 0 6px 0 #9333ea;
  }

  .reading-banner h2 {
    font-family: 'Fredoka One', cursive;
    font-size: 32px;
    margin-bottom: 10px;
  }

  @media (max-width: 480px) {
    .topics-grid { grid-template-columns: 1fr; }
    .tabs { flex-direction: column; padding: 0 20px; gap: 10px; }
    .tab-btn { width: 100%; text-align: center; }
  }
</style>
</head>
<body>

<header>
  <div class="badge">English Learning</div>
  <h1>Main <span>Menu</span> 🚀</h1>
  <p class="subtitle">เลือกหมวดหมู่และระดับชั้นที่ต้องการเรียนรู้</p>
</header>

<div class="entrance-container">
  <button class="btn-entrance" onclick="goToEntrance()">
    🎯 English for M.1 Entrance 🏆
  </button>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('grammar')">Grammar 📝</button>
  <button class="tab-btn" onclick="switchTab('reading')">Reading 📖</button>
</div>

<div id="grammar-section" class="content-section active">
  <div class="topics-grid" id="grammar-grid">
    </div>
</div>

<div id="reading-section" class="content-section">
  <div class="reading-banner">
    <h2>Reading Comprehension 📚</h2>
    <p style="font-weight: 600; font-size: 16px; opacity: 0.9;">บทความสนุกๆ สำหรับฝึกอ่าน กำลังจะมาเร็วๆ นี้!</p>
  </div>
</div>

<script>
// Data for Grammar Topics
const grammarTopics = [
  "Part of Speech", "Noun", "Article", "Quantifier", "Pronoun",
  "Subject-Verb Agreement", "Present Tenses", "Past Tenses", "Future Tenses",
  "Passive Voice", "Conditional Sentence", "Non-Finite Verb", "Modal Verb",
  "Reported Speech", "Adjective", "Adverb", "Comparison", "Preposition",
  "Conjunction", "Question Tag"
];

// Generate Topic Cards
const grid = document.getElementById('grammar-grid');

grammarTopics.forEach((topic, index) => {
  const card = document.createElement('div');
  card.className = 'topic-card';
  card.id = `card-${index}`;
  
  card.innerHTML = `
    <div class="topic-header" onclick="toggleCard(${index})">
      <div class="topic-header-left">
        <div class="topic-num">${index + 1}</div>
        <div class="topic-title">${topic}</div>
      </div>
      <div class="toggle-icon">▼</div>
    </div>
    <div class="level-group">
      <button class="level-btn primary" onclick="goToLesson(${index + 1}, 'primary')">
        Primary School <span class="level-tag">ประถม</span>
      </button>
      <button class="level-btn junior" onclick="goToLesson(${index + 1}, 'junior')">
        Junior High <span class="level-tag">ม.ต้น</span>
      </button>
      <button class="level-btn high" onclick="goToLesson(${index + 1}, 'high')">
        High School <span class="level-tag">ม.ปลาย</span>
      </button>
    </div>
  `;
  
  grid.appendChild(card);
});

// Function to Toggle Card Accordion
function toggleCard(index) {
  const cardToToggle = document.getElementById(`card-${index}`);
  const isCurrentlyOpen = cardToToggle.classList.contains('open');

  // ปิดการ์ดใบอื่นทั้งหมดก่อน (ลบส่วนนี้ออกได้ถ้าอยากให้เปิดพร้อมกันได้หลายอัน)
  document.querySelectorAll('.topic-card').forEach(card => {
    card.classList.remove('open');
  });

  // ถ้ามันไม่ได้เปิดอยู่แต่แรก ให้เปิดมันขึ้นมา
  if (!isCurrentlyOpen) {
    cardToToggle.classList.add('open');
  }
}

// Tab Switching Logic
function switchTab(tabId) {
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.classList.remove('active');
  });
  if(event) event.target.classList.add('active');

  document.querySelectorAll('.content-section').forEach(sec => {
    sec.classList.remove('active');
  });
  document.getElementById(`${tabId}-section`).classList.add('active');
}

function goToEntrance() {
  // เปลี่ยนหน้าไปที่ไฟล์ M.1 Entrance
  window.location.href = 'EnglishforM.1Entrance.html';
}

function goToLesson(topicId, level) {
  if(event) event.stopPropagation(); 
  alert(`กำลังไปที่บทเรียนหัวข้อที่ ${topicId} สำหรับระดับ ${level}`); 

  // ถ้าเป็นหัวข้อที่ 1 (Part of Speech)
  if (topicId === 1) { 
    if (level === 'junior' || level === 'high') {
      // ไปหน้ามัธยม
      window.location.href = 'PartofSpeech(Secondary).html'; 
      return;
    } 
    else if (level === 'primary') {
      // ไปหน้าประถม
      window.location.href = 'parts-of-speech-p6.html'; 
      return;
    }
  }

  // ถ้าคลิกหัวข้ออื่นที่ยังไม่ได้สร้าง
  alert(`หน้าของหัวข้อที่ ${topicId} ระดับ ${level} ยังไม่ได้สร้างครับ 🚧`);
}

</script>

</body>
</html>
