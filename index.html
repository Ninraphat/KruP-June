<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Learning Platform 🌟</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fff9f0;
    --card: #ffffff;
    --primary: #ff6b35;
    --secondary: #4ecdc4;
    --accent: #ffe66d;
    --purple: #a855f7;
    --green: #22c55e;
    --red: #ef4444;
    --text: #1e1b18;
    --muted: #78716c;
    --shadow: 0 4px 0 #e5d5c5;
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    background-image:
      radial-gradient(circle at 10% 20%, #ffe66d33 0%, transparent 40%),
      radial-gradient(circle at 90% 80%, #4ecdc433 0%, transparent 40%),
      radial-gradient(circle at 50% 50%, #ff6b3511 0%, transparent 60%);
    min-height: 100vh;
    color: var(--text);
    padding: 24px 16px 60px;
  }

  header { text-align: center; margin-bottom: 24px; }
  
  .badge {
    display: inline-block;
    background: var(--primary);
    color: white;
    font-size: 13px;
    font-weight: 800;
    padding: 4px 14px;
    border-radius: 999px;
    margin-bottom: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  h1 { font-family: 'Fredoka One', cursive; font-size: clamp(28px, 6vw, 42px); color: var(--primary); line-height: 1.2; }
  h1 span { color: var(--secondary); }
  .subtitle { margin-top: 6px; color: var(--muted); font-size: 15px; font-weight: 600; }

  /* 1. Global Level Selector */
  .level-selector {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin: 0 auto 24px;
    background: white;
    padding: 8px;
    border-radius: 999px;
    box-shadow: var(--shadow);
    border: 2px solid #f0e8df;
    max-width: 500px;
  }

  .lvl-btn {
    flex: 1;
    background: transparent;
    border: none;
    padding: 10px 16px;
    border-radius: 999px;
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    font-weight: 800;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
  }

  .lvl-btn[data-active="true"] { background: var(--secondary); color: white; box-shadow: 0 2px 0 #2db5ac; }

  /* 2. Category Tabs */
  .tabs { display: flex; justify-content: center; gap: 12px; margin-bottom: 32px; }
  
  .tab-btn {
    background: white; border: 2px solid #f0e8df; box-shadow: 0 3px 0 #e5d5c5;
    padding: 10px 24px; border-radius: 12px; font-family: 'Fredoka One', cursive;
    font-size: 16px; color: var(--muted); cursor: pointer; transition: all 0.2s;
  }

  .tab-btn:hover { transform: translateY(-2px); }
  .tab-btn[data-active="true"] { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 4px 0 #d94e1f; }

  /* M.1 Entrance Special Banner */
  .entrance-banner {
    background: linear-gradient(135deg, #ffbe0b, #ff6b35);
    border-radius: var(--radius); padding: 20px; text-align: center;
    color: white; font-family: 'Fredoka One', cursive; font-size: 20px;
    box-shadow: 0 6px 0 #d94e1f; cursor: pointer; margin-bottom: 32px;
    transition: transform 0.2s; display: none;
  }
  .entrance-banner:hover { transform: translateY(-2px); }
  .entrance-banner p { font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 700; margin-top: 4px; opacity: 0.9; }

  /* Content Area & Grid */
  .content-section { display: none; max-width: 900px; margin: 0 auto; }
  .content-section[data-active="true"] { display: block; animation: fadeIn 0.4s ease; }
  
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .topics-list { display: flex; flex-direction: column; gap: 16px; }

  /* 3. New Topic Card */
  .topic-card {
    background: var(--card); border-radius: var(--radius);
    box-shadow: var(--shadow); border: 2px solid #f0e8df;
    overflow: hidden; transition: border-color 0.2s;
  }

  .topic-card:hover { border-color: var(--accent); }
  .topic-card.empty-topic { opacity: 0.7; }
  .topic-card.empty-topic:hover { border-color: #f0e8df; }

  .topic-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px; cursor: pointer; background: transparent; transition: background 0.2s;
  }
  .topic-card:not(.empty-topic) .topic-header:hover { background: #faf5f0; }

  .topic-info { display: flex; align-items: center; gap: 16px; }
  .topic-num {
    background: var(--primary); color: white; font-family: 'Fredoka One', cursive;
    width: 40px; height: 40px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center; font-size: 18px;
  }
  .topic-card.empty-topic .topic-num { background: #d6d3d1; }
  
  .topic-title { font-size: 18px; font-weight: 800; color: var(--text); }
  .topic-meta { font-size: 13px; color: var(--muted); font-weight: 600; margin-top: 2px; }

  .toggle-icon { font-size: 14px; color: var(--muted); transition: transform 0.3s ease; }
  .topic-card.open .toggle-icon { transform: rotate(180deg); color: var(--primary); }
  .topic-card.open .topic-header { background: #faf5f0; border-bottom: 2px solid #f0e8df; }

  /* 4. Subtopics Structure */
  .subtopics-container {
    padding: 0; max-height: 0; opacity: 0; overflow: hidden; transition: all 0.3s ease;
  }
  .topic-card.open .subtopics-container {
    padding: 20px; max-height: 2000px; opacity: 1; overflow: visible;
  }

  .subtopic-item { margin-bottom: 20px; padding-bottom: 16px; border-bottom: 2px dashed #f0e8df; }
  .subtopic-item:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }

  .subtopic-title { font-size: 16px; font-weight: 800; color: var(--secondary); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .subtopic-title::before { content: '👉'; font-size: 14px; }

  .action-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }

  .btn-action {
    background: #ffffff; border: 2px solid #e5d5c5; border-radius: 10px;
    padding: 10px; font-family: 'Nunito', sans-serif; font-size: 14px;
    font-weight: 700; color: var(--text); cursor: pointer; text-align: center;
    transition: all 0.15s; display: flex; flex-direction: column; align-items: center; gap: 4px;
  }
  .btn-action span.icon { font-size: 18px; }
  
  .btn-action.lesson:hover { border-color: var(--secondary); background: #f0fdfa; color: #0d9488; }
  .btn-action.exercise:hover { border-color: var(--primary); background: #fff3e0; color: #c2410c; }
  .btn-action.test:hover { border-color: var(--purple); background: #faf5ff; color: #7e22ce; }

  @media (max-width: 600px) {
    .level-selector { flex-direction: column; border-radius: 16px; }
    .lvl-btn { border-radius: 8px; }
  }
</style>
</head>
<body>

<header>
  <div class="badge">English Learning Dashboard</div>
  <h1>Select <span>Module</span> 🚀</h1>
  <p class="subtitle">ระบบจัดการเนื้อหาและแบบฝึกหัด</p>
</header>

<div class="level-selector" id="levelSelector">
  <button class="lvl-btn" data-active="true" onclick="setLevel('primary')">👶 Primary (ประถม)</button>
  <button class="lvl-btn" data-active="false" onclick="setLevel('junior')">👦 Junior High (ม.ต้น)</button>
  <button class="lvl-btn" data-active="false" onclick="setLevel('high')">🧑 High School (ม.ปลาย)</button>
</div>

<div class="entrance-banner" id="entranceBanner" onclick="window.location.href='EnglishforM.1Entrance.html'">
  🎯 English for M.1 Entrance 🏆
  <p>คอร์สติวเข้มและข้อสอบเข้า ม.1 ตะลุยโจทย์จัดเต็ม!</p>
</div>

<div class="tabs">
  <button class="tab-btn" data-active="true" onclick="switchTab('grammar')">📝 Grammar</button>
  <button class="tab-btn" data-active="false" onclick="switchTab('reading')">📖 Reading</button>
</div>

<div id="grammar-section" class="content-section" data-active="true">
  <div class="topics-list" id="grammar-list"></div>
</div>

<div id="reading-section" class="content-section" data-active="false">
  <div style="text-align:center; padding: 40px; background: white; border-radius: 16px; border: 2px dashed #e5d5c5;">
    <h2 style="font-family:'Fredoka One'; color:var(--purple); margin-bottom: 10px;">Reading Comprehension 📚</h2>
    <p style="color:var(--muted); font-weight:700;">บทความแยกตามระดับชั้น กำลังจะมาเร็วๆ นี้!</p>
  </div>
</div>

<script>
let currentLevel = 'primary';

// ==========================================
// 🗄️ DATABASE: พื้นที่สำหรับอัปเดตข้อมูลของคุณ
// วิธีเพิ่มปุ่ม: ก๊อปปี้ปีกกา { type: "...", icon: "...", label: "...", url: "..." } วางต่อกันโดยมีลูกน้ำ (,) คั่น
// ==========================================
const grammarDatabase = [
  { id: 1, title: "Part of Speech", desc: "นาม สรรพนาม กริยา ฯลฯ", levels: {
      primary: [
        { name: "พื้นฐาน Part of Speech", actions: [
           { type: "lesson", icon: "📖", label: "เนื้อหาบทเรียน", url: "Grammar/Part of Speech/c-part-of-speech-p.html" },
           { type: "exercise", icon: "✏️", label: "แบบฝึกหัด", url: "Grammar/Part of Speech/e-part-of-speech-p.html" }
        ]}
      ],
      junior: [
        { name: "Part of Speech (ม.ต้น)", actions: [
          { type: "lesson", icon: "📖", label: "เนื้อหาบทเรียน", url: "Grammar/Part of Speech/c-part-of-speech-j.html" }
        ]}
      ],
      high: [
        { name: "Advanced Parts of Speech", actions: [
          { type: "lesson", icon: "📖", label: "เนื้อหาบทเรียน", url: "Grammar/Part of Speech/c-part-of-speech-h.html" }
        ]}
      ] 
  }},
  { id: 2, title: "Noun", desc: "คำนาม", levels: { 
      primary: [
        { name: "Nouns: ชื่อเรียกสิ่งรอบตัว", actions: [
          { type: "lesson", icon: "📖", label: "เนื้อหาบทเรียน", url: "c-noun-p.html" }
        ]}
      ], 
      junior: [
        { name: "Nouns & Quantifiers", actions: [
          { type: "lesson", icon: "📖", label: "เนื้อหาบทเรียน", url: "c-noun-j.html" }
        ]}
      ], 
      high: [
        { name: "Advanced Nouns", actions: [
          { type: "lesson", icon: "📖", label: "เนื้อหาบทเรียน", url: "c-noun-h.html" }
        ]}
      ] 
  }},
  { id: 3, title: "Article", desc: "a, an, the", levels: { 
      primary: [
        { name: "Articles: a, an, the", actions: [
          { type: "lesson", icon: "📖", label: "เนื้อหาบทเรียน", url: "c-article-p.html" },
          { type: "exercise", icon: "✏️", label: "แบบฝึกหัด", url: "e-article-p.html" }
        ]}
      ], 
      junior: [
        { name: "Articles (ม.ต้น)", actions: [
          { type: "lesson", icon: "📖", label: "เนื้อหาบทเรียน", url: "c-article-j.html" },
          { type: "exercise", icon: "✏️", label: "แบบฝึกหัด", url: "e-article-j.html" }
        ]}
      ], 
      high: [
        { name: "Advanced Articles", actions: [
          { type: "lesson", icon: "📖", label: "เนื้อหาบทเรียน", url: "c-article-h.html" },
          { type: "exercise", icon: "✏️", label: "แบบฝึกหัด", url: "e-article-h.html" }
        ]}
      ] 
  }},
  { id: 4, title: "Quantifier", desc: "some, any, much, many", levels: { 
      primary: [
        { name: "Quantifiers: คำบอกปริมาณ", actions: [
          { type: "lesson", icon: "📖", label: "เนื้อหาบทเรียน", url: "c-quantifiers-p.html" }
        ]}
      ], 
      junior: [
        { name: "Quantifiers (ม.ต้น)", actions: [
          { type: "lesson", icon: "📖", label: "เนื้อหาบทเรียน", url: "c-quantifiers-j.html" }
        ]}
      ], 
      high: [
        { name: "Advanced Quantifiers", actions: [
          { type: "lesson", icon: "📖", label: "เนื้อหาบทเรียน", url: "c-quantifiers-h.html" }
        ]}
      ] 
  }},
  { id: 5, title: "Pronoun", desc: "คำสรรพนาม", levels: { 
      primary: [
        { name: "Pronouns: คำสรรพนาม (ประถม)", actions: [
          { type: "lesson", icon: "📖", label: "เนื้อหาบทเรียน", url: "c-pronoun-p.html" }
        ]}
      ], 
      junior: [
        { name: "Pronouns (ม.ต้น)", actions: [
          { type: "lesson", icon: "📖", label: "เนื้อหาบทเรียน", url: "c-pronoun-j.html" }
        ]}
      ], 
      high: [
        { name: "Advanced Pronouns", actions: [
          { type: "lesson", icon: "📖", label: "เนื้อหาบทเรียน", url: "c-pronoun-h.html" }
        ]}
      ] 
  }},
  { id: 6, title: "Subject-Verb Agreement", desc: "ความสอดคล้องประธานกริยา", levels: { primary: [], junior: [], high: [] }},
  { id: 7, title: "Present Tenses", desc: "เหตุการณ์ปัจจุบัน", levels: {
      primary: [],
      junior: [
        { name: "Present Simple", actions: [
          { type: "lesson", icon: "📖", label: "เนื้อหาและแบบฝึก", url: "present-tenses-jh.html" }
        ]},
        { name: "Present Perfect", actions: [
          { type: "exercise", icon: "🔥", label: "ทดสอบ Perfect", url: "present-perfect-jh.html" }
        ]}
      ],
      high: []
  }},
  { id: 8, title: "Past Tenses", desc: "เหตุการณ์ในอดีต", levels: {
      primary: [],
      junior: [
        { name: "Past Simple", actions: [
          { type: "lesson", icon: "📖", label: "เนื้อหาและแบบฝึก", url: "past-simple-jh.html" }
        ]}
      ],
      high: []
  }},
  { id: 9, title: "Future Tenses", desc: "เหตุการณ์ในอนาคต", levels: { primary: [], junior: [], high: [] }},
  { id: 10, title: "Passive Voice", desc: "ประธานถูกกระทำ", levels: { primary: [], junior: [], high: [] }},
  { id: 11, title: "Conditional Sentence", desc: "ประโยคเงื่อนไข (If-clause)", levels: { primary: [], junior: [], high: [] }},
  { id: 12, title: "Non-Finite Verb", desc: "กริยาไม่แท้ (Gerund, Infinitive)", levels: { primary: [], junior: [], high: [] }},
  { id: 13, title: "Modal Verb", desc: "กริยาช่วย", levels: { primary: [], junior: [], high: [] }},
  { id: 14, title: "Reported Speech", desc: "การนำคำพูดไปเล่าต่อ", levels: { primary: [], junior: [], high: [] }},
  { id: 15, title: "Adjective", desc: "คำคุณศัพท์", levels: { primary: [], junior: [], high: [] }},
  { id: 16, title: "Adverb", desc: "คำกริยาวิเศษณ์", levels: {
      primary: [],
      junior: [
        { name: "Forming Adverb", actions: [
          { type: "lesson", icon: "📖", label: "การสร้าง Adverb", url: "forming-adverb-jh.html" }
        ]}
      ],
      high: []
  }},
  { id: 17, title: "Comparison", desc: "การเปรียบเทียบขั้นกว่า/สุด", levels: { primary: [], junior: [], high: [] }},
  { id: 18, title: "Preposition", desc: "คำบุพบทบอกตำแหน่ง/เวลา", levels: { primary: [], junior: [], high: [] }},
  { id: 19, title: "Conjunction", desc: "คำเชื่อมประโยค", levels: { primary: [], junior: [], high: [] }},
  { id: 20, title: "Question Tag", desc: "ประโยคคำถามท้ายห้อย", levels: { primary: [], junior: [], high: [] }}
];

// ==========================================
// SYSTEM LOGIC (ห้ามแก้โค้ดด้านล่างนี้ ระบบจัดการให้อัตโนมัติ)
// ==========================================

function setLevel(level) {
  currentLevel = level;
  document.querySelectorAll('.lvl-btn').forEach(btn => {
    btn.setAttribute('data-active', btn.getAttribute('onclick').includes(`'${level}'`));
  });
  
  const banner = document.getElementById('entranceBanner');
  if (banner) banner.style.display = (level === 'primary') ? 'block' : 'none';
  
  renderGrammarList();
}

function switchTab(tabId) {
  document.querySelectorAll('.tab-btn').forEach(btn => btn.setAttribute('data-active', 'false'));
  event.target.setAttribute('data-active', 'true');
  document.querySelectorAll('.content-section').forEach(sec => sec.setAttribute('data-active', 'false'));
  document.getElementById(`${tabId}-section`).setAttribute('data-active', 'true');
}

function renderGrammarList() {
  const container = document.getElementById('grammar-list');
  container.innerHTML = ''; 

  grammarDatabase.forEach(topic => {
    const card = document.createElement('div');
    const levelData = topic.levels[currentLevel];
    const hasContent = levelData && levelData.length > 0;
    
    card.className = `topic-card ${hasContent ? '' : 'empty-topic'}`;
    card.id = `topic-${topic.id}`;

    let subtopicsHTML = '';
    let metaText = hasContent ? `${levelData.length} หมวดหมู่ย่อย` : 'รออัปเดตเนื้อหา 🚧';

    if (hasContent) {
      levelData.forEach(sub => {
        let actionsHTML = '';
        sub.actions.forEach(act => {
          actionsHTML += `
            <button class="btn-action ${act.type}" onclick="go('${act.url}')">
              <span class="icon">${act.icon}</span>
              <span>${act.label}</span>
            </button>
          `;
        });
        subtopicsHTML += `
          <div class="subtopic-item">
            <div class="subtopic-title">${sub.name}</div>
            <div class="action-grid">${actionsHTML}</div>
          </div>
        `;
      });
    }

    card.innerHTML = `
      <div class="topic-header" ${hasContent ? `onclick="toggleCard(${topic.id})"` : ''}>
        <div class="topic-info">
          <div class="topic-num">${topic.id}</div>
          <div>
            <div class="topic-title">${topic.title}</div>
            <div class="topic-meta">${topic.desc} • ${metaText}</div>
          </div>
        </div>
        ${hasContent ? `<div class="toggle-icon">▼</div>` : ''}
      </div>
      <div class="subtopics-container">
        ${subtopicsHTML}
      </div>
    `;
    container.appendChild(card);
  });
}

function toggleCard(id) {
  const card = document.getElementById(`topic-${id}`);
  const isOpen = card.classList.contains('open');
  document.querySelectorAll('.topic-card').forEach(c => c.classList.remove('open'));
  if (!isOpen) card.classList.add('open');
}

function go(url) {
  event.stopPropagation();
  window.location.href = url;
}

setLevel('primary');
</script>

</body>
</html>
